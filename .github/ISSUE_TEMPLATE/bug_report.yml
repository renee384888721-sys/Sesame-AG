name: 问题反馈 / Bug report
description: 反馈你遇到的回归、崩溃、行为异常或文档问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交问题。

        **注意**：如果你要分享 RPC 配置，请前往 [RPC 分享讨论区](https://github.com/Sesame-AG/Sesame-AG/discussions/categories/rpc-%E5%88%86%E4%BA%AB)。

        提交前请先阅读：
        - [README](https://github.com/Sesame-AG/Sesame-AG/blob/dev/README.md)
        - [LEGAL](https://github.com/Sesame-AG/Sesame-AG/blob/dev/LEGAL.md)
        - [CONTRIBUTING](https://github.com/Sesame-AG/Sesame-AG/blob/dev/CONTRIBUTING.md)

        请尽量让每个回答都基于你实际观察到的现象来填写。没有复现步骤、环境信息和两组日志附件的 Bug Issue，通常没有足够上下文被处理。

        ## 先导出日志，再提交 Bug

        1. 进入模块的**日志中心**。
        2. 打开与问题发生时间、功能最匹配的日志卡片。
        3. 分别导出**错误日志**、**全部日志**和**相关模块日志**。
        4. 在 `/Download/sesame-AG/` 找到导出的文件，脱敏后将文件拖拽到下方两个指定附件框。
        5. 截图、直接粘贴日志正文，或只勾选确认框，都不能代替日志附件。

        日志只能以附件形式上传，请将脱敏后的 `.txt`、`.log`、`.zip` 等文件拖拽到对应字段；如涉及隐私信息，请先脱敏后再提交。

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      description: 所有选项均必须勾选后才能提交；不符合这些前提的 Issue 可能会被直接关闭。
      options:
        - label: 我已经阅读 README / LEGAL / CONTRIBUTING，并确认这个问题符合当前项目的学习研究定位
          required: true
        - label: 我已经搜索过现有 Issues / Pull Requests，没有找到相同或高度相似的问题
          required: true
        - label: 我已经在当前可获取的最新版本或最新提交环境中复现过这个问题
          required: true
        - label: 我已将两组脱敏日志附件拖拽到下方指定字段；我理解勾选本项不能代替实际附件
          required: true
        - label: 我愿意在后续继续补充日志、截图、复现信息并配合排查
          required: true

  - type: dropdown
    id: report_scope
    attributes:
      label: 反馈对象
      description: 选择问题直接发生的位置。
      options:
        - 模块本体
        - 目标应用
    validations:
      required: true

  - type: textarea
    id: error_logs
    attributes:
      label: 错误日志附件
      description: 请从日志中心导出错误日志并脱敏后拖拽 `.txt`、`.log`、`.zip` 等文件到此处生成附件链接；不要粘贴日志正文或只上传截图。
      placeholder: |
        请仅将脱敏后的错误日志文件拖拽到此处。
    validations:
      required: true

  - type: textarea
    id: complete_and_module_logs
    attributes:
      label: 完整日志及相关模块日志附件
      description: 请将全部日志和与问题相关的模块日志一并导出、脱敏并作为附件拖拽到此处；不要粘贴日志正文或只上传截图。
      placeholder: |
        请仅将脱敏后的全部日志和相关模块日志文件拖拽到此处。
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: 问题类型
      description: 选择最接近的类别
      options:
        - 回归问题
        - 崩溃 / 卡死
        - 行为异常
        - UI / 文档问题
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 用 1 到 3 句话说明“什么坏了”
      placeholder: |
        更新到某版本后，模块可以启动，但手动任务页面点开后立即闪退。
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 提供最短、最稳定、最可重复的复现路径
      placeholder: |
        1. 在 LSPosed 中启用模块并重启目标应用
        2. 打开模块设置页
        3. 进入“手动任务”
        4. 观察到应用闪退
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: 页面正常打开，并能看到手动任务列表。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 页面点击后立刻闪退，返回桌面；同一环境下重复三次均可复现。
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: 模块版本 / 提交
      description: 精确填写版本号、Release Tag 或 commit
      placeholder: 123-0.0.1 / 4f2c1ab
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android 版本 / 手机系统版本
      placeholder: Android 14 / LineageOS 21
    validations:
      required: true

  - type: input
    id: framework_version
    attributes:
      label: Xposed 框架与版本
      placeholder: LSPosed 1.9.3
    validations:
      required: true

  - type: input
    id: target_app_info
    attributes:
      label: 目标应用信息 / 受影响模块功能
      description: 反馈对象为“目标应用”时，填写版本；反馈对象为“模块本体”时，填写“不涉及”，并注明受影响的模块功能或页面。
      placeholder: 10.x.x.xxxx；或：不涉及，日志中心导出页面
    validations:
      required: true

  - type: input
    id: install_source
    attributes:
      label: 安装来源 / 构建方式
      description: 例如 Release APK、自编译 Debug、自编译 Release、第三方分发包
      placeholder: GitHub Release / self-built debug
    validations:
      required: true

  - type: dropdown
    id: privilege_mode
    attributes:
      label: Root / Shizuku 情况
      description: 如果与当前问题无关，也请说明
      options:
        - 未使用
        - 使用 Root
        - 使用 Shizuku
        - 两者都使用
        - 不确定
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: 补充信息
      description: 例如是否改过源码、是否只在特定配置出现、是否能回退到旧版本规避
      placeholder: |
        - 仅在开启某个实验性选项后复现
        - 回退到某版本后恢复正常
        - 使用第三方分发包时也可复现 / 不可复现
